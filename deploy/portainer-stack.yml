services:
  gravel-router:
    image: registry.gitlab.com/graveldeluxe/gravel-router/app:latest
    container_name: gravel-router
    restart: unless-stopped
    depends_on:
      - brouter
      - ors
    ports:
      - "${GRAVEL_ROUTER_PORT:-8086}:80"
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.scope: "gravel-router"

  brouter:
    image: registry.gitlab.com/graveldeluxe/gravel-router/brouter:latest
    container_name: gravel-brouter
    restart: unless-stopped
    environment:
      JAVA_OPTS: "${BROUTER_JAVA_OPTS:--Xms256m -Xmx2g -DmaxRunningTime=300 -DuseRFCMimeType=false}"
    volumes:
      - "${BROUTER_SEGMENTS_PATH:-/mnt/gravel-router/segments4}:/segments4:ro"
      - "${BROUTER_CUSTOM_PROFILES_PATH:-/mnt/gravel-router/customprofiles}:/customprofiles"
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.scope: "gravel-router"

  ors:
    image: openrouteservice/openrouteservice:v9.7.1
    container_name: gravel-ors
    restart: unless-stopped
    environment:
      XMS: "${ORS_XMS:-1g}"
      XMX: "${ORS_XMX:-4g}"
      ors.engine.profile_default.build.source_file: /home/ors/files/stuttgart-regbez-latest.osm.pbf
      ors.engine.profiles.driving-car.enabled: "false"
      ors.engine.profiles.cycling-mountain.enabled: "true"
    volumes:
      - "${ORS_DATA_PATH:-/mnt/gravel-router/ors}/config:/home/ors/config"
      - "${ORS_DATA_PATH:-/mnt/gravel-router/ors}/elevation_cache:/home/ors/elevation_cache"
      - "${ORS_DATA_PATH:-/mnt/gravel-router/ors}/files:/home/ors/files"
      - "${ORS_DATA_PATH:-/mnt/gravel-router/ors}/graphs:/home/ors/graphs"
      - "${ORS_DATA_PATH:-/mnt/gravel-router/ors}/logs:/home/ors/logs"
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.centurylinklabs.watchtower.scope: "gravel-router"

  watchtower-gravel-router:
    image: ghcr.io/containrrr/watchtower:latest
    container_name: watchtower-gravel-router
    restart: unless-stopped
    environment:
      DOCKER_CONFIG: /config/.docker
    command: ["--scope", "gravel-router", "--cleanup", "--interval", "300"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker:/config/.docker:ro
