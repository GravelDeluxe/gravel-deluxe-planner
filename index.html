<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Gravel Planner</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="map" aria-label="Karte"></div>

    <aside class="panel" aria-label="Planung">
      <h1>Gravel Planner</h1>
      <p class="home-base">⌂ Home Base · Bad Rappenau</p>

      <div class="search-row">
        <input id="searchInput" type="search" placeholder="Ort suchen …" aria-label="Ort suchen" />
        <button id="searchButton" type="button">Suchen</button>
      </div>
      <ul id="searchResults" hidden></ul>

      <div class="mode-row" role="radiogroup" aria-label="Planungsmodus">
        <label><input type="radio" name="mode" value="loop" checked /> Runde</label>
        <label><input type="radio" name="mode" value="manual" /> Strecke</label>
      </div>

      <label class="field-label" for="routingProfile">Routingprofil</label>
      <select id="routingProfile" aria-describedby="routingProfileHelp">
        <option value="gravel">Gravel (Original)</option>
        <option value="gravel-konstant" selected>Gravel GravelDeluxe</option>
      </select>
      <p id="routingProfileHelp" class="field-help">
        GravelDeluxe: Strecke über BRouter, Runde über den lokalen ORS.
      </p>

      <div id="loopControls">
        <label for="loopKmMin">Distanzbereich (km)</label>
        <div class="search-row">
          <input id="loopKmMin" type="number" min="5" max="300" value="30" aria-label="Minimum km" />
          <input id="loopKmMax" type="number" min="5" max="300" value="50" aria-label="Maximum km" />
        </div>
        <label for="loopHmMin">Höhenmeterbereich (hm)</label>
        <div class="search-row">
          <input id="loopHmMin" type="number" min="0" max="10000" step="50" value="200" aria-label="Minimum Höhenmeter" />
          <input id="loopHmMax" type="number" min="0" max="10000" step="50" value="800" aria-label="Maximum Höhenmeter" />
        </div>
        <label for="loopDirection">Grobe Richtung</label>
        <select id="loopDirection">
          <option value="any" selected>Beliebig</option>
          <option value="N">Norden</option>
          <option value="NE">Nordosten</option>
          <option value="E">Osten</option>
          <option value="SE">Südosten</option>
          <option value="S">Süden</option>
          <option value="SW">Südwesten</option>
          <option value="W">Westen</option>
          <option value="NW">Nordwesten</option>
        </select>
        <p class="field-help">Lenkt die Hauptausdehnung der Runde; keine harte Sperrzone.</p>
        <div class="route-options">
          <label>
            <input id="allowMeadowEarth" type="checkbox" checked />
            Wiesenwege mit Erde verwenden
          </label>
          <label for="maxSlopePercent">Maximale Steigung (%)</label>
          <input id="maxSlopePercent" type="number" min="3" max="30" step="1" value="10" />
        </div>
        <button id="addHighlight" class="secondary-wide" type="button">Highlight auf Karte setzen</button>
        <div id="highlights" class="highlights" aria-label="Highlights"></div>
        <button id="generateLoop" type="button">GravelDeluxe-Vorschläge</button>
        <div id="suggestions" aria-label="Routen-Vorschläge"></div>
      </div>

      <label class="field-label" for="routeName">Routenname für Export</label>
      <input id="routeName" class="route-name" type="text" value="GravelDeluxe-Runde" maxlength="100" />

      <div class="action-row">
        <button id="undoButton" type="button">Zurück</button>
        <button id="clearButton" type="button">Löschen</button>
        <button id="reverseButton" type="button">Umkehren</button>
        <button id="saveButton" type="button">Speichern</button>
        <button id="exportButton" type="button">GPX</button>
        <button id="feedbackButton" type="button">Feedback</button>
      </div>

      <section id="feedbackPanel" class="feedback-panel" hidden aria-label="Routenfeedback">
        <div class="feedback-heading">
          <strong>Schlechte Passage markieren</strong>
          <button id="feedbackClose" type="button" aria-label="Feedback schließen">×</button>
        </div>
        <label for="feedbackScrubber">Route scrubben</label>
        <input id="feedbackScrubber" type="range" min="0" max="1000" value="0" />
        <output id="feedbackPosition">Start · 0,0 km</output>
        <div class="feedback-markers">
          <button id="feedbackIn" type="button">IN setzen</button>
          <button id="feedbackOut" type="button">OUT setzen</button>
        </div>
        <label for="feedbackProblem">Problem</label>
        <select id="feedbackProblem">
          <option value="unnötiger Abstecher">Unnötiger Abstecher</option>
          <option value="Hauptstraße">Hauptstraße</option>
          <option value="Sackgasse">Sackgasse / zurück</option>
          <option value="Schieben">Schiebepassage</option>
          <option value="Oberfläche">Schlechte Oberfläche</option>
          <option value="Steigung">Zu steil</option>
          <option value="anderes">Anderes</option>
        </select>
        <textarea id="feedbackNote" rows="2" placeholder="Optionale Notiz …"></textarea>
        <div id="feedbackPassages" class="feedback-passages"></div>
        <button id="feedbackExport" type="button">Feedback herunterladen</button>
      </section>

      <div id="savedRoutes" aria-label="Gespeicherte Routen"></div>

      <p id="status" role="status"></p>
    </aside>

    <footer class="statsbar" aria-label="Streckendaten">
      <div><strong id="statDistance">0 km</strong><span>Distanz</span></div>
      <div><strong id="statAscent">0 hm</strong><span>Anstieg</span></div>
      <svg id="profile" viewBox="0 0 400 80" preserveAspectRatio="none" aria-label="Höhenprofil"></svg>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="runtime-config.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
