stages:
  - test
  - build

variables:
  DOCKER_TLS_CERTDIR: ""

test:
  stage: test
  image: node:22-alpine
  script:
    - npm test

.docker-build:
  stage: build
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build-app:
  extends: .docker-build
  script:
    - docker build -t "$CI_REGISTRY_IMAGE/app:$CI_COMMIT_SHORT_SHA" -t "$CI_REGISTRY_IMAGE/app:latest" .
    - docker push "$CI_REGISTRY_IMAGE/app:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/app:latest"

build-brouter:
  extends: .docker-build
  script:
    - docker build -f Dockerfile.brouter -t "$CI_REGISTRY_IMAGE/brouter:$CI_COMMIT_SHORT_SHA" -t "$CI_REGISTRY_IMAGE/brouter:latest" .
    - docker push "$CI_REGISTRY_IMAGE/brouter:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/brouter:latest"
